name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            set -euo pipefail
            cd /home/user/backend
            git fetch "https://x-access-token:${{ github.token }}@github.com/Dmitry716/k-r-backend.git" main
            git checkout -f main
            git reset --hard FETCH_HEAD
            git clean -fd
            docker compose up -d --build
            docker compose ps

            # Wait until backend healthcheck is green
            backend_container_id="$(docker compose ps -q backend)"
            if [ -n "${backend_container_id}" ]; then
              for i in $(seq 1 30); do
                status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}nohealth{{end}}' "${backend_container_id}" || true)"
                if [ "${status}" = "healthy" ] || [ "${status}" = "nohealth" ]; then
                  break
                fi
                sleep 2
              done
            fi

            # Smoke check
            curl -fsS "http://localhost:3001/api/health" >/dev/null

            # Lightweight cleanup (avoid system-wide prune on every deploy)
            docker image prune -f --filter "until=168h" >/dev/null || true
            docker builder prune -f --filter "until=168h" >/dev/null || true
