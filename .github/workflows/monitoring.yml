name: Monitoring and Alerts

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  uptime-and-ssl:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check public endpoints and SSL expiry
        id: checks
        shell: bash
        run: |
          set -euo pipefail

          SITE_URL="https://k-r.by"
          API_HEALTH_URL="https://k-r.by/api/health"
          API_MONUMENTS_URL="https://k-r.by/api/monuments?limit=1"

          site_code="$(curl -sS -o /dev/null -w "%{http_code}" --max-time 20 "$SITE_URL" || echo "000")"
          api_health_code="$(curl -sS -o /dev/null -w "%{http_code}" --max-time 20 "$API_HEALTH_URL" || echo "000")"
          monuments_code="$(curl -sS -o /dev/null -w "%{http_code}" --max-time 20 "$API_MONUMENTS_URL" || echo "000")"

          expiry_raw="$(echo | openssl s_client -servername k-r.by -connect k-r.by:443 2>/dev/null | openssl x509 -noout -enddate | cut -d= -f2)"
          expiry_ts="$(date -d "$expiry_raw" +%s)"
          now_ts="$(date +%s)"
          days_left="$(( (expiry_ts - now_ts) / 86400 ))"

          failed="false"
          reason=""
          if [ "$site_code" != "200" ]; then
            failed="true"
            reason="${reason} site=$site_code;"
          fi
          if [ "$api_health_code" != "200" ]; then
            failed="true"
            reason="${reason} api_health=$api_health_code;"
          fi
          if [ "$monuments_code" != "200" ]; then
            failed="true"
            reason="${reason} monuments=$monuments_code;"
          fi
          if [ "$days_left" -le 21 ]; then
            failed="true"
            reason="${reason} ssl_days_left=$days_left;"
          fi

          echo "site_code=$site_code" >> "$GITHUB_OUTPUT"
          echo "api_health_code=$api_health_code" >> "$GITHUB_OUTPUT"
          echo "monuments_code=$monuments_code" >> "$GITHUB_OUTPUT"
          echo "ssl_days_left=$days_left" >> "$GITHUB_OUTPUT"
          echo "failed=$failed" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

      - name: Send Telegram alert
        if: steps.checks.outputs.failed == 'true'
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SITE_CODE: ${{ steps.checks.outputs.site_code }}
          API_HEALTH_CODE: ${{ steps.checks.outputs.api_health_code }}
          MONUMENTS_CODE: ${{ steps.checks.outputs.monuments_code }}
          SSL_DAYS_LEFT: ${{ steps.checks.outputs.ssl_days_left }}
          REASON: ${{ steps.checks.outputs.reason }}
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram secrets are not configured, skipping alert delivery."
            exit 0
          fi
          msg="🚨 k-r.by monitoring alert%0A"
          msg="${msg}Site: ${SITE_CODE}%0A"
          msg="${msg}API health: ${API_HEALTH_CODE}%0A"
          msg="${msg}Monuments: ${MONUMENTS_CODE}%0A"
          msg="${msg}SSL days left: ${SSL_DAYS_LEFT}%0A"
          msg="${msg}Reason: ${REASON}%0A"
          msg="${msg}Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS --max-time 20 \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${msg}" >/dev/null

      - name: Fail job on monitoring issue
        if: steps.checks.outputs.failed == 'true'
        run: |
          echo "Monitoring check failed: ${{ steps.checks.outputs.reason }}"
          exit 1
