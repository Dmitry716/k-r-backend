name: Seed page SEO

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Overwrite existing SEO records'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  seed-seo:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Run SEO seed on VPS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            set -euo pipefail
            cd /home/user/backend
            ARGS=""
            if [ "${{ inputs.force }}" = "true" ]; then
              ARGS="--force"
            fi
            docker compose exec -T backend node scripts/seed-page-seo-vitebsk.js ${ARGS}
