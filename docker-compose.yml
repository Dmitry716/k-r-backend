services:
  backend:
    build: .
    restart: unless-stopped
    ports:
      - '3001:3001'
    depends_on:
      - db
    environment:
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: ${NODE_ENV}
      ORIGIN_URLS: ${ORIGIN_URLS}
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      FRONTEND_PUBLIC_PATH: ${FRONTEND_PUBLIC_PATH}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      CONSENT_RETENTION_DAYS: ${CONSENT_RETENTION_DAYS}
      CONSENT_CLEANUP_INTERVAL_HOURS: ${CONSENT_CLEANUP_INTERVAL_HOURS}
      ENABLE_REVIEW_SCRAPING: ${ENABLE_REVIEW_SCRAPING:-true}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      YM_PERMANENT_ID: ${YM_PERMANENT_ID}
      YM_SESSION_ID: ${YM_SESSION_ID}
      YM_SESSION_ID2: ${YM_SESSION_ID2}
      PUPPETEER_EXECUTABLE_PATH: ${PUPPETEER_EXECUTABLE_PATH:-/usr/bin/chromium-browser}
    volumes:
      - .:/app
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - /app/node_modules
      - /home/user/frontend/public:/home/user/frontend/public:ro

  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

networks:
  default:
    name: public_net
    external: true
